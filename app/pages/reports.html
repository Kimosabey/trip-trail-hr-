<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — TripTrail</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="../assets/js/tailwind-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body class="bg-background text-on-surface">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header id="tt-nav"></header>

  <main id="main" class="max-w-container mx-auto px-4 sm:px-8 py-8">
    <div class="flex flex-wrap items-end justify-between gap-3 mb-6">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Reports</h1>
        <p class="text-on-surface-variant mt-1">Travel spend analytics across all employees.</p>
      </div>
      <div class="flex flex-wrap items-end gap-2">
        <div><label class="block text-xs text-on-surface-variant mb-1" for="from">From</label>
          <input id="from" type="date" class="h-10 rounded-md border border-slate-200 bg-surface px-2" /></div>
        <div><label class="block text-xs text-on-surface-variant mb-1" for="to">To</label>
          <input id="to" type="date" class="h-10 rounded-md border border-slate-200 bg-surface px-2" /></div>
        <button id="clear" class="h-10 px-3 rounded-md border border-slate-200 bg-surface text-sm font-medium hover:bg-slate-50">Clear</button>
        <button id="export-report" class="tt-tap tt-press h-10 inline-flex items-center gap-2 px-4 rounded-md bg-success text-white font-semibold hover:opacity-90">
          <span class="material-symbols-outlined" aria-hidden="true">download</span>Export report
        </button>
      </div>
    </div>

    <!-- KPI cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="tt-card p-5"><p class="text-on-surface-variant text-sm">Total Claims</p><p id="k-total" class="text-2xl font-bold mt-1">—</p></div>
      <div class="tt-card p-5"><p class="text-on-surface-variant text-sm">Total Spend</p><p id="k-spend" class="text-2xl font-bold mt-1">—</p></div>
      <div class="tt-card p-5"><p class="text-on-surface-variant text-sm">Avg / Claim</p><p id="k-avg" class="text-2xl font-bold mt-1">—</p></div>
      <div class="tt-card p-5"><p class="text-on-surface-variant text-sm">Pending</p><p id="k-pending" class="text-2xl font-bold mt-1">—</p></div>
    </div>

    <!-- charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <section class="tt-card p-5"><h2 class="font-semibold text-lg mb-3">Spend by Month</h2><div id="chart-month" style="height:300px"></div></section>
      <section class="tt-card p-5"><h2 class="font-semibold text-lg mb-3">Spend by Department</h2><div id="chart-dept" style="height:300px"></div></section>
      <section class="tt-card p-5"><h2 class="font-semibold text-lg mb-3">Status Breakdown</h2><div id="chart-status" style="height:300px"></div></section>
      <section class="tt-card p-5"><h2 class="font-semibold text-lg mb-3">Top Spenders</h2><div id="chart-emp" style="height:300px"></div></section>
    </div>

    <!-- tables -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <section class="tt-card p-5">
        <h2 class="font-semibold text-lg mb-3">Per-Employee Totals</h2>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-left text-xs uppercase text-on-surface-variant border-b border-slate-200">
            <th class="py-2 pr-2">Employee</th><th class="py-2 pr-2">Dept</th><th class="py-2 pr-2 text-right">Claims</th><th class="py-2 pr-2 text-right">Total</th>
          </tr></thead><tbody id="emp-rows"></tbody>
        </table></div>
      </section>
      <section class="tt-card p-5">
        <h2 class="font-semibold text-lg mb-3">Outstanding Advances (aging)</h2>
        <div id="advances" class="space-y-2 text-sm"></div>
      </section>
    </div>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/lib/supabaseClient.js"></script>
  <script src="../assets/js/lib/format.js"></script>
  <script src="../assets/js/lib/mockData.js"></script>
  <script src="../assets/js/lib/api.js"></script>
  <script src="../assets/js/lib/session.js"></script>
  <script src="../assets/js/lib/auth.js"></script>
  <script src="../assets/js/components/statusBadge.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/nav.js"></script>
  <script src="../assets/js/pages/reports.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — TripTrail</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="../assets/js/tailwind-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body class="bg-background text-on-surface">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header id="tt-nav"></header>

  <main id="main" class="max-w-container mx-auto px-4 sm:px-8 py-8">
    <h1 class="text-3xl font-bold tracking-tight">Users &amp; Roles</h1>
    <p class="text-on-surface-variant mb-6">Manage staff profiles and assign roles. Only HR can see this page.</p>

    <div class="tt-card p-3 mb-4 flex flex-wrap items-center gap-3">
      <div class="relative flex-1 min-w-[200px]">
        <label class="sr-only" for="q">Search users</label>
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" aria-hidden="true">search</span>
        <input id="q" type="search" placeholder="Search name or email…" class="w-full pl-10 pr-3 h-11 rounded-md border border-slate-200 bg-surface" />
      </div>
      <span id="count" class="text-sm text-on-surface-variant"></span>
    </div>

    <div class="tt-card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[900px]">
          <thead><tr class="text-left text-xs font-semibold uppercase tracking-wide text-on-surface-variant border-b border-slate-200">
            <th scope="col" class="px-4 py-3">Name</th>
            <th scope="col" class="px-4 py-3">Email</th>
            <th scope="col" class="px-4 py-3">Emp Code</th>
            <th scope="col" class="px-4 py-3">Department</th>
            <th scope="col" class="px-4 py-3">Grade</th>
            <th scope="col" class="px-4 py-3">Role</th>
            <th scope="col" class="px-4 py-3"><span class="sr-only">Save</span></th>
          </tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/lib/supabaseClient.js"></script>
  <script src="../assets/js/lib/format.js"></script>
  <script src="../assets/js/lib/mockData.js"></script>
  <script src="../assets/js/lib/api.js"></script>
  <script src="../assets/js/lib/session.js"></script>
  <script src="../assets/js/lib/auth.js"></script>
  <script src="../assets/js/components/statusBadge.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/nav.js"></script>
  <script src="../assets/js/pages/admin-users.js"></script>
</body>
</html>

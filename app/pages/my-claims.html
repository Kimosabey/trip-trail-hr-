<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Claims — TripTrail</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="../assets/js/tailwind-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body class="bg-background text-on-surface">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header id="tt-nav"></header>

  <main id="main" class="max-w-container mx-auto px-4 sm:px-8 py-8">
    <!-- page header -->
    <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">My Claims</h1>
        <p class="text-on-surface-variant mt-1">Manage and track your travel expense reports.</p>
      </div>
      <a href="claim-editor.html" class="tt-tap tt-press inline-flex items-center gap-2 bg-primary hover:bg-primary-dark text-white font-semibold px-5 rounded-md">
        <span class="material-symbols-outlined" aria-hidden="true">add</span>New Travel Report
      </a>
    </div>

    <!-- filters -->
    <div class="tt-card p-3 mb-6 flex flex-wrap items-center gap-3">
      <label class="sr-only" for="q">Search claims</label>
      <div class="relative flex-1 min-w-[200px]">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" aria-hidden="true">search</span>
        <input id="q" type="search" placeholder="Search claims…" class="w-full pl-10 pr-3 h-11 rounded-md border border-slate-200 bg-surface" />
      </div>
      <label class="sr-only" for="status">Filter by status</label>
      <select id="status" class="h-11 rounded-md border border-slate-200 bg-surface px-3">
        <option value="">All Statuses</option>
        <option value="submitted">Submitted</option>
        <option value="hod_approved">HOD Approved</option>
        <option value="checked">Checked</option>
        <option value="approved">Approved</option>
        <option value="paid">Paid</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>

    <!-- claims table (desktop) / cards (mobile) -->
    <div class="tt-card overflow-hidden">
      <table class="w-full hidden sm:table">
        <thead>
          <tr class="text-left text-xs font-semibold uppercase tracking-wide text-on-surface-variant border-b border-slate-200">
            <th scope="col" class="px-6 py-3">Purpose</th>
            <th scope="col" class="px-6 py-3">Place of Visit</th>
            <th scope="col" class="px-6 py-3">Trip Dates</th>
            <th scope="col" class="px-6 py-3 text-right">Grand Total</th>
            <th scope="col" class="px-6 py-3">Status</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="cards" class="sm:hidden divide-y divide-slate-200"></div>
      <div id="empty" class="hidden p-12 text-center text-on-surface-variant">
        <span class="material-symbols-outlined text-5xl text-slate-300" aria-hidden="true">travel_explore</span>
        <p class="mt-2">No claims yet. Create your first travel report.</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/lib/supabaseClient.js"></script>
  <script src="../assets/js/lib/format.js"></script>
  <script src="../assets/js/lib/mockData.js"></script>
  <script src="../assets/js/lib/api.js"></script>
  <script src="../assets/js/lib/session.js"></script>
  <script src="../assets/js/lib/auth.js"></script>
  <script src="../assets/js/components/statusBadge.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/nav.js"></script>
  <script src="../assets/js/pages/my-claims.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Dashboard — TripTrail</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="../assets/js/tailwind-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body class="bg-background text-on-surface">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header id="tt-nav"></header>

  <main id="main" class="max-w-container mx-auto px-4 sm:px-8 py-8">
    <h1 class="text-3xl font-bold tracking-tight">HR Dashboard</h1>
    <p class="text-on-surface-variant mb-6">Overview and management of all expense claims.</p>

    <!-- stat cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="tt-card p-5"><div class="flex items-center gap-2 text-on-surface-variant text-sm"><span class="material-symbols-outlined text-primary" aria-hidden="true">description</span>Total Claims</div><p id="s-total" class="text-2xl font-bold mt-2">—</p></div>
      <div class="tt-card p-5"><div class="flex items-center gap-2 text-on-surface-variant text-sm"><span class="material-symbols-outlined text-warning" aria-hidden="true">hourglass_top</span>Pending Approval</div><p id="s-pending" class="text-2xl font-bold mt-2">—</p></div>
      <div class="tt-card p-5"><div class="flex items-center gap-2 text-on-surface-variant text-sm"><span class="material-symbols-outlined text-success" aria-hidden="true">verified</span>Approved</div><p id="s-approved" class="text-2xl font-bold mt-2">—</p></div>
      <div class="tt-card p-5"><div class="flex items-center gap-2 text-on-surface-variant text-sm"><span class="material-symbols-outlined text-teal" aria-hidden="true">payments</span>Total Reimbursed</div><p id="s-reimbursed" class="text-2xl font-bold mt-2">—</p></div>
    </div>

    <!-- tracking pipeline: count at each stage (core to HR tracking) -->
    <div class="tt-card p-4 mb-6">
      <h2 class="text-sm font-semibold text-on-surface-variant mb-3">Claim pipeline</h2>
      <ol id="pipeline" class="flex flex-wrap items-stretch gap-2"></ol>
    </div>

    <!-- filter bar -->
    <div class="tt-card p-3 mb-4 flex flex-wrap items-center gap-3">
      <div class="relative flex-1 min-w-[200px]">
        <label class="sr-only" for="q">Search claims</label>
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" aria-hidden="true">search</span>
        <input id="q" type="search" placeholder="Search claims…" class="w-full pl-10 pr-3 h-11 rounded-md border border-slate-200 bg-surface" />
      </div>
      <label class="sr-only" for="dept">Department</label>
      <select id="dept" class="h-11 rounded-md border border-slate-200 bg-surface px-3"><option value="">All Departments</option></select>
      <label class="sr-only" for="status">Status</label>
      <select id="status" class="h-11 rounded-md border border-slate-200 bg-surface px-3">
        <option value="">All Statuses</option>
        <option value="submitted">Submitted</option><option value="hod_approved">HOD Approved</option>
        <option value="checked">Checked</option><option value="approved">Approved</option>
        <option value="paid">Paid</option><option value="rejected">Rejected</option>
      </select>
      <input id="import-file" type="file" accept=".csv,text/csv" class="sr-only" />
      <button id="import" class="tt-tap tt-press inline-flex items-center gap-2 px-4 rounded-md border border-slate-200 bg-surface font-semibold hover:bg-slate-50">
        <span class="material-symbols-outlined" aria-hidden="true">upload</span>Import CSV
      </button>
      <button id="export" class="tt-tap tt-press inline-flex items-center gap-2 px-4 rounded-md bg-success text-white font-semibold hover:opacity-90">
        <span class="material-symbols-outlined" aria-hidden="true">download</span>Export to Excel
      </button>
    </div>

    <!-- table -->
    <div class="tt-card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[900px]">
          <thead><tr class="text-left text-xs font-semibold uppercase tracking-wide text-on-surface-variant border-b border-slate-200">
            <th scope="col" class="px-4 py-3">Employee</th><th scope="col" class="px-4 py-3">Dept</th>
            <th scope="col" class="px-4 py-3">Purpose</th><th scope="col" class="px-4 py-3">Place</th>
            <th scope="col" class="px-4 py-3">Trip Dates</th><th scope="col" class="px-4 py-3 text-right">Total</th>
            <th scope="col" class="px-4 py-3">Status</th><th scope="col" class="px-4 py-3">Actions</th>
          </tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <p id="count" class="px-4 py-3 text-sm text-on-surface-variant border-t border-slate-100"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/lib/supabaseClient.js"></script>
  <script src="../assets/js/lib/format.js"></script>
  <script src="../assets/js/lib/mockData.js"></script>
  <script src="../assets/js/lib/api.js"></script>
  <script src="../assets/js/lib/session.js"></script>
  <script src="../assets/js/lib/auth.js"></script>
  <script src="../assets/js/components/statusBadge.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/nav.js"></script>
  <script src="../assets/js/pages/hr-dashboard.js"></script>
</body>
</html>

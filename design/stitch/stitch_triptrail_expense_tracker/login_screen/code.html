<!-- Headers -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Sign in to TripTrail</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-8">Travel &amp; expense reporting for RANGSONS LLP</p>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-stack-gap" method="POST">
<div class="flex flex-col text-left">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="email">Company email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full h-12 pl-10 pr-4 rounded bg-surface-container-lowest border border-outline-variant text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow placeholder:text-outline-variant" id="email" name="email" placeholder="e.g. name@rangsons.com" required="" type="email"/>
</div>
</div>
<button class="w-full h-11 mt-2 bg-primary-container text-on-primary-container font-label-md text-label-md rounded flex items-center justify-center gap-2 hover:bg-primary transition-colors shadow-sm hover:shadow-[0px_4px_6px_-1px_rgba(37,99,235,0.2)] active:scale-[0.98]" type="submit">
                    Send magic link
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<p class="mt-6 font-body-sm text-body-sm text-outline">
                We'll email you a secure sign-in link — no password needed.
            </p>
</div>
<!-- Ambient decorative elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10 flex items-center justify-center">
<div class="absolute w-[800px] h-[800px] bg-primary-fixed-dim/20 rounded-full blur-3xl opacity-50 -top-1/4 -right-1/4"></div>
<div class="absolute w-[600px] h-[600px] bg-secondary-container/20 rounded-full blur-3xl opacity-50 -bottom-1/4 -left-1/4"></div>
</div>
</main>
<script>
        // Simple form submission effect
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0;">progress_activity</span> Sending...';
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">check_circle</span> Link Sent!';
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                btn.classList.replace('text-on-primary-container', 'text-on-tertiary-container');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-tertiary-container', 'bg-primary-container');
                    btn.classList.replace('text-on-tertiary-container', 'text-on-primary-container');
                    btn.classList.remove('opacity-80', 'pointer-events-none');
                    this.reset();
                }, 3000);
            }, 1500);
        });
    </script>
</body></html>
